<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LEGO Collection</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
  <h1>🧱 LEGO Collection</h1>

  <div class="controls">
    <input id="search" placeholder="Søk figurer..." oninput="render()">
    <button onclick="toggleTheme()">🌙</button>
  </div>
</header>

<main id="grid"></main>

<!-- modal -->
<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <img id="modalImg">
    <h2 id="modalName"></h2>
    <p id="modalValue"></p>
    <button onclick="toggleFavorite(currentId)">⭐ Favoritt</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
